<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect trick
      // Saves the full URL to sessionStorage so index.html can restore it.
      sessionStorage.redirect = location.href;
      // Redirect to the root of the deployed app (handles project-page base paths)
      var base = location.pathname.split('/').slice(0, 2).join('/');
      location.replace(location.origin + base + '/');
    </script>
  </head>
  <body></body>
</html>
