<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect trick
      // Converts 404s back into the index route so React Router can handle them
      var l = window.location;
      var segmentCount = 1; // set to 0 for user/org pages, 1 for project pages
      var path = l.pathname.slice(1).split('/').slice(segmentCount).join('/');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.slice(0, l.pathname.indexOf('/', segmentCount + 1) + 1) +
        '?p=/' + path +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
